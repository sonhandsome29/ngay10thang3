<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bai 5 QLSP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <style>
        body {
            background: #f5f6f8;
        }

        .body-content {
            min-height: 70vh;
            padding-top: 20px;
            padding-bottom: 24px;
        }

        .footer-card {
            border-top: 1px solid #dee2e6;
            color: #6c757d;
            font-size: 0.92rem;
            background: #fff;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-body" data-bs-theme="dark">
    <div class="container-fluid px-4 d-flex justify-content-between align-items-center gap-3 flex-wrap">
        <div class="d-flex align-items-center gap-3">
            <a class="navbar-brand m-0" th:href="@{/home}">Home</a>
            <a class="navbar-brand m-0" th:href="@{/products}">Products</a>
            <a class="navbar-brand m-0" th:href="@{/order}" sec:authorize="hasRole('USER')">Order</a>
        </div>

        <div class="d-flex align-items-center gap-3 text-white">
            <span sec:authorize="isAuthenticated()">Xin chào, <strong sec:authentication="name"></strong></span>
            <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()" class="m-0">
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>

<main layout:fragment="content" class="container body-content"></main>

<footer class="footer-card py-3 text-center">
    <p class="mb-0">&copy; 2025 - Phát triển ứng dụng với J2EE</p>
</footer>
</body>
</html>
