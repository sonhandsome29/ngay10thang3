<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <title>Edit Product</title>
</head>
<body>
<div layout:fragment="content" class="container body-content">
    <div class="card shadow-sm">
        <div class="card-body">
            <h2 class="h5 mb-3">Edit Product</h2>

            <form th:action="@{'/products/update/' + ${product.id}}" th:object="${product}" method="post" class="row g-3" novalidate>
                <input type="hidden" th:field="*{id}">

                <div class="col-12">
                    <label for="name" class="form-label">Name</label>
                    <input class="form-control" type="text" th:field="*{name}" id="name" placeholder="Product Name">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>

                <div class="col-12">
                    <label for="image" class="form-label">Image URL</label>
                    <input class="form-control" type="text" th:field="*{image}" id="image" placeholder="https://image.jpg">
                    <div class="mt-2" th:if="${product.image != null and !#strings.isEmpty(product.image)}">
                        <img th:src="${product.image}" alt="Current image"
                             style="height:120px; width:150px; object-fit:cover; border-radius:4px;">
                    </div>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('image')}" th:errors="*{image}"></div>
                </div>

                <div class="col-12">
                    <label for="price" class="form-label">Price</label>
                    <input class="form-control" type="number" th:field="*{price}" id="price" placeholder="Price">
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                </div>

                <div class="col-12">
                    <label for="category" class="form-label">Category</label>
                    <select th:field="*{category.id}" class="form-control" id="category">
                        <option value="">-- Select Category --</option>
                        <option th:each="category : ${categories}"
                                th:value="${category.id}"
                                th:text="${category.name}"></option>
                    </select>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
                </div>

                <div class="col-12 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Update Product</button>
                    <a th:href="@{/products}" class="btn btn-outline-secondary">Back</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
